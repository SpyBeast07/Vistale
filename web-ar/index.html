<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vistale WebAR Engine</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background: #000; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        #ar-container { 
            position: fixed; 
            width: 100vw; 
            height: 100vh; 
            z-index: 1;
        }
        #ui-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            pointer-events: none;
            color: white;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }
        .start-btn {
            pointer-events: auto;
            padding: 12px 24px;
            background: #fff;
            color: #000;
            border: none;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: transform 0.2s;
        }
        .start-btn:active {
            transform: scale(0.95);
        }
        #loading-screen {
            position: fixed;
            inset: 0;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            transition: opacity 0.5s;
        }
    </style>
</head>
<body>
    <div id="loading-screen">Loading WebAR...</div>
    
    <div id="ar-container"></div>

    <div id="ui-overlay">
        <button id="start-btn" class="start-btn">START AR EXPERIENCE</button>
    </div>

    <script type="module" src="/src/main.js"></script>
</body>
</html>
